<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tether</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="app">
        <header class="header" data-tauri-drag-region>
            <div class="logo" data-tauri-drag-region>
                <div class="logo-icon" data-tauri-drag-region>
                    <svg width="16" height="16" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="136" cy="192" r="52" fill="white"/>
                        <circle cx="376" cy="192" r="52" fill="white"/>
                        <rect x="136" y="164" width="240" height="56" fill="white"/>
                        <rect x="228" y="192" width="56" height="148" rx="28" fill="white"/>
                        <circle cx="256" cy="368" r="52" fill="white"/>
                    </svg>
                </div>
                <h1 data-tauri-drag-region>Tether</h1>
            </div>
            <p class="meta" style="color:var(--text-muted); margin-top:2px;" data-tauri-drag-region>Autodesk Drive Sync</p>
        </header>

        <!-- Login View -->
        <div id="login-view" class="view active">
            <div class="card" style="margin-top:auto; margin-bottom:auto; text-align:center;">
                <h2 style="margin-bottom:12px; font-size:16px;">Connect account</h2>
                <p style="margin-bottom:20px;">Sign in to access your Autodesk Drive.</p>
                <button id="btn-login" class="btn btn-primary">
                    Sign in with Autodesk
                </button>
                <p id="login-status" class="status-text" style="margin-top:16px; min-height:16px;"></p>
            </div>
        </div>

        <!-- Sync Status View -->
        <div id="status-view" class="view">
            <div class="card">
                <div class="sync-status">
                    <span id="status-icon" class="status-icon">✓</span>
                    <div>
                        <strong id="status-text" style="font-size:13px;">Up to date</strong>
                        <p id="service-state" class="meta">Service: starting...</p>
                    </div>
                </div>
            </div>

            <div class="card" style="flex:1; display:flex; flex-direction:column; overflow:hidden; padding: 12px 16px;">
                <h3 style="margin-bottom:8px;">Recent Activity</h3>
                <div style="flex:1; overflow-y:auto;">
                    <ul id="activity-list" class="activity-list">
                        <li class="empty">No recent activity</li>
                    </ul>
                </div>
            </div>

            <div class="card" id="prompts-card" style="display:none; padding:12px 16px; border-color:var(--warning);">
                <h3 style="color:var(--warning); margin-bottom:4px;">Action Required</h3>
                <div id="prompt-list" class="prompt-list"></div>
            </div>

            <div class="card" style="padding: 12px 16px;">
                <h3 style="margin-bottom:8px;">Synced Projects</h3>
                <div id="projects-list" style="margin-bottom: 8px; max-height: 100px; overflow-y: auto;">
                    <!-- Project Items go here -->
                </div>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="drive-url-input" placeholder="Paste Autodesk Drive folder link..." class="input" style="flex: 1;" />
                    <button id="btn-add-project" class="btn btn-primary" style="padding: 6px 12px;">Add</button>
                </div>
                <p id="project-add-status" style="margin-top: 6px; font-size: 12px; color: var(--warning);"></p>
            </div>

            <div class="actions">
                <button id="btn-open-folder" class="btn btn-secondary">📁 Open folder</button>
                <button id="btn-pause" class="btn btn-secondary">⏸ Pause</button>
                <button id="btn-service" class="btn btn-secondary">📡 Go offline</button>
            </div>
        </div>
    </div>

    <script>
        const { invoke } = window.__TAURI__.core;
        
        let discoveryComplete = false;

        async function initFlow() {
            try {
                const isLoggedIn = await invoke('check_auth_status');
                if (isLoggedIn) {
                    await proceedToSync();
                    loadSyncedProjects();
                }
            } catch (e) {
                console.error("Auto-login fast start failed:", e);
            }
        }

        async function proceedToSync() {
            const ls = document.getElementById('login-status');
            try {
                // Only auto-discover if there are no saved synced folders.
                // This preserves manual additions/removals across restarts.
                if (!discoveryComplete) {
                    const saved = await invoke('get_synced_folders');
                    if (!saved || saved.length === 0) {
                        ls.textContent = 'Discovering folders...';
                        await invoke('auto_discover_drive_folders');
                    }
                    discoveryComplete = true;
                }

                ls.textContent = 'Starting sync engine...';
                await invoke('start_unified_sync');
                
                document.getElementById('login-view').classList.remove('active');
                document.getElementById('status-view').classList.add('active');
                pollStatus();
            } catch (e) {
                ls.textContent = 'Error: ' + e;
                ls.style.color = 'var(--error)';
            }
        }

        // Login Handler
        document.getElementById('btn-login').addEventListener('click', async () => {
            const btn = document.getElementById('btn-login');
            const ls = document.getElementById('login-status');
            try {
                btn.disabled = true;
                ls.textContent = 'Waiting for browser login...';
                ls.style.color = 'var(--text-muted)';
                await invoke('start_login');
                ls.textContent = 'Login successful!';
                ls.style.color = 'var(--success)';
                await proceedToSync();
            } catch (e) {
                ls.textContent = 'Login failed: ' + e;
                ls.style.color = 'var(--error)';
                btn.disabled = false;
            }
        });

        // Sync Polling
        async function pollStatus() {
            if (!document.getElementById('status-view').classList.contains('active')) return;
            
            try {
                const resp = await invoke('get_sync_status');
                const statusText = document.getElementById('status-text');
                const statusIcon = document.getElementById('status-icon');
                const serviceState = document.getElementById('service-state');
                const serviceButton = document.getElementById('btn-service');
                
                if (serviceState) {
                    serviceState.textContent = 'Service: ' + (resp.service_state || 'unknown');
                }
                
                if (serviceButton) {
                    serviceButton.textContent = (resp.service_state === 'offline' || resp.service_state === 'disabled')
                        ? '📡 Go online' : '📡 Go offline';
                }

                if (resp.status === 'Idle') {
                    const activeJobs = resp.queued_count ?? 0;
                    if (activeJobs > 0) {
                        statusIcon.textContent = '⟳';
                        statusIcon.style.background = 'rgba(99, 102, 241, 0.1)';
                        statusIcon.style.color = 'var(--accent-hover)';
                        statusText.textContent = `Syncing (${activeJobs} queued)`;
                    } else {
                        statusIcon.textContent = '✓';
                        statusIcon.style.background = 'rgba(74, 222, 128, 0.1)';
                        statusIcon.style.color = 'var(--success)';
                        statusText.textContent = 'Up to date';
                    }
                } else if (resp.status === 'Paused') {
                    statusIcon.textContent = '⏸';
                    statusIcon.style.background = 'rgba(136, 136, 136, 0.1)';
                    statusIcon.style.color = 'var(--text-muted)';
                    statusText.textContent = 'Paused';
                } else if (typeof resp.status === 'object') {
                    if (resp.status.Syncing) {
                        statusIcon.textContent = '⟳';
                        statusIcon.style.background = 'rgba(99, 102, 241, 0.1)';
                        statusIcon.style.color = 'var(--accent-hover)';
                        statusText.textContent = `Syncing ${resp.status.Syncing.active_count} actions...`;
                    } else if (resp.status.Error) {
                        statusIcon.textContent = '✕';
                        statusIcon.style.background = 'rgba(248, 113, 113, 0.1)';
                        statusIcon.style.color = 'var(--error)';
                        statusText.textContent = 'Error: ' + resp.status.Error.message;
                    }
                }

                // Update Report (Journal / Activity)
                const report = await invoke('get_troubleshooter_report');
                const aList = document.getElementById('activity-list');
                
                // Construct activity
                const activities = [];
                if (resp.queue_jobs && resp.queue_jobs.length > 0) {
                    for(const j of resp.queue_jobs.slice(0,3)) {
                        activities.push(`⏳ ${j.operation}: ${j.local_path}`);
                    }
                }
                
                if (report.activity_lines && report.activity_lines.length > 0) {
                    for(const line of report.activity_lines.slice(0,5)) {
                        // "2023-10-27T...: pull [success] folder/file — details"
                        const parts = line.split(/:\s|\s\[|\]\s|—/);
                        if (parts.length >= 4) {
                            activities.push(`✓ ${parts[1]}: ${parts[3]}`);
                        } else {
                            activities.push(`✓ ${line}`);
                        }
                    }
                }
                
                aList.innerHTML = '';
                if (activities.length === 0) {
                    aList.innerHTML = '<li class="empty">No recent activity</li>';
                } else {
                    activities.slice(0,6).forEach(text => {
                        const li = document.createElement('li');
                        li.textContent = text;
                        li.title = text;
                        li.style.whiteSpace = 'nowrap';
                        li.style.overflow = 'hidden';
                        li.style.textOverflow = 'ellipsis';
                        aList.appendChild(li);
                    });
                }
                
                await loadPromptCenter();
            } catch (e) {
                console.error('Poll error:', e);
            }
        }

        async function resolvePrompt(id, resolution) {
            try {
                await invoke('resolve_pending_prompt', { promptId: id, resolution });
                pollStatus();
            } catch (e) {
                alert('Resolution failed: ' + e);
            }
        }

        async function loadPromptCenter() {
            try {
                const prompts = await invoke('list_pending_prompts');
                const card = document.getElementById('prompts-card');
                const list = document.getElementById('prompt-list');
                
                if (!prompts || prompts.length === 0) {
                    card.style.display = 'none';
                    list.innerHTML = '';
                    return;
                }
                
                card.style.display = 'block';
                list.innerHTML = '';
                
                for (const prompt of prompts) {
                    const wrap = document.createElement('div');
                    wrap.className = 'prompt-card';
                    
                    const title = prompt.kind.replaceAll('_', ' ').toUpperCase();
                    wrap.innerHTML = `
                        <strong>${title}</strong>
                        <p style="font-size:11px; margin-top:4px; color:var(--text-primary);">${prompt.message}</p>
                        <p class="meta" style="margin-top:2px;">${prompt.relative_path}</p>
                    `;
                    
                    const actions = document.createElement('div');
                    actions.className = 'prompt-actions';

                    const buttons = prompt.kind === 'delete_confirm'
                        ? [
                            ['Delete Local', 'delete_local_only'],
                            ['Delete Both', 'delete_local_and_cloud'],
                            ['Cancel', 'cancel'],
                        ] : [
                            ['Keep Both', 'keep_both'],
                            ['Keep Local', 'keep_local'],
                            ['Keep Cloud', 'keep_cloud'],
                            ['Cancel', 'cancel'],
                        ];

                    for (const [label, value] of buttons) {
                        const btn = document.createElement('button');
                        btn.className = 'btn btn-secondary btn-small';
                        btn.textContent = label;
                        btn.onclick = () => resolvePrompt(prompt.id, value);
                        actions.appendChild(btn);
                    }
                    
                    wrap.appendChild(actions);
                    list.appendChild(wrap);
                }
            } catch (e) {
                console.error("Prompts error:", e);
            }
        }

        // Action Handlers
        document.getElementById('btn-open-folder').addEventListener('click', () => invoke('open_sync_folder'));
        
        document.getElementById('btn-pause').addEventListener('click', async () => {
            const btn = document.getElementById('btn-pause');
            if (btn.textContent.includes('Pause')) {
                await invoke('pause_sync');
                btn.textContent = '▶ Resume';
            } else {
                await invoke('resume_sync');
                btn.textContent = '⏸ Pause';
            }
        });
        
        document.getElementById('btn-service').addEventListener('click', async () => {
            const label = document.getElementById('btn-service').textContent || '';
            const next = label.includes('online') ? 'running' : 'offline';
            await invoke('set_service_state', { serviceState: next });
            pollStatus();
        });

        async function loadSyncedProjects() {
            try {
                const projects = await invoke('get_synced_folders');
                const list = document.getElementById('projects-list');
                list.innerHTML = '';
                if (!projects || projects.length === 0) {
                    list.innerHTML = '<div class="empty">No projects added yet</div>';
                    return;
                }
                for (const proj of projects) {
                    const el = document.createElement('div');
                    el.style.display = 'flex';
                    el.style.justifyContent = 'space-between';
                    el.style.alignItems = 'center';
                    el.style.padding = '4px 0';
                    el.innerHTML = `
                        <span style="font-size: 13px; color: var(--text-primary); text-overflow: ellipsis; overflow: hidden; white-space: nowrap;">📄 ${proj.display_name}</span>
                        <button class="btn" style="background:transparent; color:var(--error); padding:2px;" onclick="removeProject('${proj.folder_id}')">✕</button>
                    `;
                    list.appendChild(el);
                }
            } catch (e) {
                console.error("Load projects error:", e);
            }
        }

        window.removeProject = async function(folderId) {
            try {
                await invoke('remove_synced_folder', { folderId });
                document.getElementById('project-add-status').textContent = 'Removed. Restart Tether to apply changes.';
                loadSyncedProjects();
            } catch (e) {
                alert('Remove failed: ' + e);
            }
        };

        document.getElementById('btn-add-project').addEventListener('click', async () => {
            const input = document.getElementById('drive-url-input');
            const status = document.getElementById('project-add-status');
            const rawUrl = input.value.trim();
            if (!rawUrl) return;
            
            try {
                status.textContent = 'Adding...';
                const match = rawUrl.match(/drive\.autodesk\.com\/folders\/([A-Za-z0-9_-]+)/);
                if (!match) {
                    status.textContent = 'Invalid Autodesk Drive URL';
                    return;
                }
                const b64 = match[1].replace(/-/g, '+').replace(/_/g, '/');
                const folderUrn = atob(b64);
                
                await invoke('add_synced_folder_url', { folderUrn });
                input.value = '';
                status.textContent = 'Added securely! Please restart Tether to sync.';
                loadSyncedProjects();
            } catch (e) {
                status.textContent = 'Error: ' + e;
            }
        });

        // Initialize application
        window.addEventListener('DOMContentLoaded', initFlow);
        
        // Loop
        setInterval(pollStatus, 4000);
    </script>
</body>
</html>
