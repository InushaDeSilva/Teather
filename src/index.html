<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tether</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <h1>Tether</h1>
            </div>
            <p class="subtitle">Autodesk Cloud Sync</p>
        </header>

        <!-- Login View -->
        <div id="login-view" class="view active">
            <div class="card">
                <h2>Connect your Autodesk account</h2>
                <p>Sign in to access your BIM 360 and ACC projects.</p>
                <button id="btn-login" class="btn btn-primary">
                    Sign in with Autodesk
                </button>
                <p id="login-status" class="status-text"></p>
            </div>
        </div>

        <!-- Project Picker View -->
        <div id="picker-view" class="view">
            <div class="card">
                <h2>Select a project folder</h2>
                <div id="hub-list" class="tree-list">
                    <p class="loading">Loading hubs...</p>
                </div>
            </div>
        </div>

        <!-- Sync Status View -->
        <div id="status-view" class="view">
            <div class="card">
                <div class="sync-status">
                    <span id="status-icon" class="status-icon">✓</span>
                    <div>
                        <strong id="status-text">Up to date</strong>
                        <p id="last-sync" class="meta">Last synced: just now</p>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>Recent Activity</h3>
                <ul id="activity-list" class="activity-list">
                    <li class="empty">No activity yet</li>
                </ul>
            </div>

            <div class="actions">
                <button id="btn-open-folder" class="btn btn-secondary">📁 Open sync folder</button>
                <button id="btn-pause" class="btn btn-secondary">⏸ Pause syncing</button>
            </div>
        </div>
    </div>

    <script>
        const { invoke } = window.__TAURI__.core;

        // ── Login ──
        document.getElementById('btn-login').addEventListener('click', async () => {
            try {
                document.getElementById('login-status').textContent = 'Waiting for browser login...';
                await invoke('start_login');
                document.getElementById('login-status').textContent = 'Login successful!';
                
                // Transition to project picker
                document.getElementById('login-view').classList.remove('active');
                document.getElementById('picker-view').classList.add('active');
                loadHubs();
            } catch (e) {
                document.getElementById('login-status').textContent = 'Error: ' + e;
            }
        });

        // ── Auto Login Check ──
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const isLoggedIn = await invoke('check_auth_status');
                if (isLoggedIn) {
                    document.getElementById('login-view').classList.remove('active');
                    document.getElementById('picker-view').classList.add('active');
                    loadHubs();
                }
            } catch (e) {
                console.error("Auto-login check failed:", e);
            }
        });

        // ── Project Picker ──
        async function loadHubs() {
            const list = document.getElementById('hub-list');
            try {
                list.innerHTML = '<i>Loading your Autodesk Drive...</i>';
                
                // 1. Load the Flat Drive View (Aggregated Folders)
                const driveItems = await invoke('get_drive_view');
                list.innerHTML = '';

                // Create "Autodesk Drive" virtual hub
                const driveHub = document.createElement('div');
                driveHub.className = 'tree-item hub-item selected';
                driveHub.innerHTML = `<strong>☁️ Autodesk Drive</strong> <small style="color:#666; margin-left:8px;">(Personal & Shared)</small>`;
                list.appendChild(driveHub);

                const driveContainer = document.createElement('div');
                driveContainer.className = 'projects-container';
                list.appendChild(driveContainer);

                if (driveItems.length === 0) {
                    driveContainer.innerHTML = '<p class="empty" style="margin-left:20px;">No folders found in Drive.</p>';
                } else {
                    for (const item of driveItems) {
                        const indent = 20 + (item.depth || 0) * 20;
                        if (item.depth === 0) {
                            const header = document.createElement('div');
                            header.className = 'tree-item';
                            header.style.marginLeft = '20px';
                            header.style.marginTop = '8px';
                            header.style.opacity = '0.7';
                            header.style.fontSize = '12px';
                            header.innerHTML = `📂 ${item.name}`;
                            driveContainer.appendChild(header);
                        } else {
                            appendFolderRow(driveContainer, item, indent);
                        }
                    }
                }

                // 2. "Add from Drive URL" input
                const urlSection = document.createElement('div');
                urlSection.style.cssText = 'margin: 12px 0; padding: 10px; border: 1px dashed #444; border-radius: 8px;';
                urlSection.innerHTML = `
                    <div style="font-size:12px; color:#999; margin-bottom:6px;">📎 Paste an Autodesk Drive link to add a hidden folder:</div>
                    <div style="display:flex; gap:6px;">
                        <input id="drive-url-input" type="text" placeholder="https://drive.autodesk.com/folders/..." 
                               style="flex:1; padding:6px 8px; border-radius:6px; border:1px solid #555; background:#1a1a24; color:#e8e8f0; font-size:12px;">
                        <button id="drive-url-btn" style="padding:6px 12px; border-radius:6px; border:none; background:#4a6cf7; color:white; cursor:pointer; font-size:12px; white-space:nowrap;">Add folder</button>
                    </div>
                    <div id="drive-url-status" style="font-size:11px; margin-top:4px; color:#888;"></div>
                `;
                list.appendChild(urlSection);

                document.getElementById('drive-url-btn').onclick = async () => {
                    const input = document.getElementById('drive-url-input');
                    const status = document.getElementById('drive-url-status');
                    const rawUrl = input.value.trim();
                    if (!rawUrl) return;

                    const match = rawUrl.match(/drive\.autodesk\.com\/folders\/([A-Za-z0-9_-]+)/);
                    if (!match) {
                        status.style.color = '#f55';
                        status.textContent = 'Invalid Autodesk Drive URL.';
                        return;
                    }

                    try {
                        status.style.color = '#888';
                        status.textContent = 'Resolving folder...';
                        const b64 = match[1].replace(/-/g, '+').replace(/_/g, '/');
                        const folderUrn = atob(b64);

                        const resolved = await invoke('resolve_drive_folder', { folderUrn: folderUrn });
                        status.style.color = '#4f4';
                        status.textContent = 'Found: ' + resolved.name;
                        input.value = '';

                        appendFolderRow(driveContainer, resolved, 20);
                    } catch (e) {
                        status.style.color = '#f55';
                        status.textContent = 'Error: ' + e;
                    }
                };

                // 3. Load "Advanced" section for Hub/Project hierarchy
                const advancedHeader = document.createElement('div');
                advancedHeader.className = 'tree-item';
                advancedHeader.style.marginTop = '20px';
                advancedHeader.style.borderTop = '1px solid #333';
                advancedHeader.style.paddingTop = '15px';
                advancedHeader.innerHTML = `<strong>🛠️ All Projects (Advanced)</strong>`;
                list.appendChild(advancedHeader);

                const hubs = await invoke('get_hubs');
                for (const hub of hubs) {
                    const div = document.createElement('div');
                    div.className = 'tree-item';
                    div.style.marginLeft = '10px';
                    const isFusion = (hub.extension_type || "").includes("core:Hub");
                    div.innerHTML = `<span>${isFusion ? '🏗️' : '🏢'} ${hub.name}</span>`;
                    div.onclick = () => loadProjects(hub.id, div);
                    list.appendChild(div);
                }
            } catch (e) {
                list.innerHTML = `<p class="error">Error: ${e}</p>`;
            }
        }

        function appendFolderRow(container, item, indent) {
            const row = document.createElement('div');
            row.className = 'tree-item project-item';
            row.style.marginLeft = indent + 'px';
            row.style.display = 'flex';
            row.style.alignItems = 'center';
            row.style.gap = '4px';

            const expandBtn = document.createElement('span');
            expandBtn.textContent = '▶';
            expandBtn.style.cursor = 'pointer';
            expandBtn.style.fontSize = '10px';
            expandBtn.style.width = '16px';
            expandBtn.style.flexShrink = '0';
            expandBtn.title = 'Browse subfolders';

            const label = document.createElement('span');
            label.style.cursor = 'pointer';
            label.innerHTML = `📁 ${item.name}`;
            label.title = 'Sync this folder';

            row.appendChild(expandBtn);
            row.appendChild(label);
            container.appendChild(row);

            const childContainer = document.createElement('div');
            childContainer.style.display = 'none';
            container.appendChild(childContainer);

            let loaded = false;
            expandBtn.onclick = async (e) => {
                e.stopPropagation();
                if (childContainer.style.display === 'none') {
                    childContainer.style.display = 'block';
                    expandBtn.textContent = '▼';
                    if (!loaded) {
                        loaded = true;
                        childContainer.innerHTML = '<p class="loading" style="margin-left:' + (indent + 20) + 'px; font-size:12px;">Loading...</p>';
                        try {
                            const subfolders = await invoke('get_subfolders', {
                                projectId: item.project_id,
                                folderId: item.folder_id
                            });
                            childContainer.innerHTML = '';
                            if (subfolders.length === 0) {
                                const empty = document.createElement('p');
                                empty.style.marginLeft = (indent + 20) + 'px';
                                empty.style.fontSize = '12px';
                                empty.style.color = '#888';
                                empty.textContent = 'No subfolders';
                                childContainer.appendChild(empty);
                            } else {
                                for (const sf of subfolders) {
                                    appendFolderRow(childContainer, {
                                        name: sf.name,
                                        hub_id: item.hub_id,
                                        project_id: item.project_id,
                                        folder_id: sf.id
                                    }, indent + 20);
                                }
                            }
                        } catch (err) {
                            childContainer.innerHTML = '<p class="error" style="margin-left:' + (indent + 20) + 'px; font-size:12px;">Error: ' + err + '</p>';
                        }
                    }
                } else {
                    childContainer.style.display = 'none';
                    expandBtn.textContent = '▶';
                }
            };

            label.onclick = async (e) => {
                e.stopPropagation();
                try {
                    await invoke('start_sync', {
                        hubId: item.hub_id,
                        projectId: item.project_id,
                        projectName: item.name,
                        folderId: item.folder_id
                    });
                    showStatusView();
                } catch (err) {
                    alert('Failed to start sync: ' + err);
                }
            };
        }

        function showStatusView() {
            document.getElementById('picker-view').classList.remove('active');
            document.getElementById('status-view').classList.add('active');
        }

        async function loadProjects(hubId, selectedElement) {
            // Remove any existing project list from other hubs
            document.querySelectorAll('#hub-list .advanced-projects-container').forEach(el => el.remove());

            const projContainer = document.createElement('div');
            projContainer.className = 'projects-container advanced-projects-container';
            projContainer.innerHTML = '<p class="loading" style="margin-left: 30px;">Loading...</p>';
            selectedElement.insertAdjacentElement('afterend', projContainer);

            try {
                const projects = await invoke('get_projects', { hubId });
                projContainer.innerHTML = '';
                for (const proj of projects) {
                    const div = document.createElement('div');
                    div.className = 'tree-item project-item';
                    div.style.marginLeft = '30px';
                    div.innerHTML = `<span>📁 ${proj.name}</span>`;
                    div.onclick = async () => {
                        try {
                            await invoke('start_sync', { 
                                hubId: hubId, 
                                projectId: proj.id, 
                                projectName: proj.name,
                                folderId: null 
                            });
                            showStatusView();
                        } catch (e) {
                            alert('Failed to start sync: ' + e);
                        }
                    };
                    projContainer.appendChild(div);
                }
            } catch (e) {
                projContainer.innerHTML = `<p class="error" style="margin-left: 30px;">Error: ${e}</p>`;
            }
        }

        // ── Sync status polling ──
        async function pollStatus() {
            try {
                const resp = await invoke('get_sync_status');
                const statusText = document.getElementById('status-text');
                const statusIcon = document.getElementById('status-icon');

                if (resp.status === 'Idle') {
                    statusIcon.textContent = '✓';
                    statusText.textContent = 'Up to date';
                } else if (resp.status === 'Paused') {
                    statusIcon.textContent = '⏸';
                    statusText.textContent = 'Paused';
                } else if (typeof resp.status === 'object' && resp.status.Syncing) {
                    statusIcon.textContent = '⟳';
                    statusText.textContent = `Syncing ${resp.status.Syncing.active_count} files...`;
                } else if (typeof resp.status === 'object' && resp.status.Error) {
                    statusIcon.textContent = '✕';
                    statusText.textContent = 'Error: ' + resp.status.Error.message;
                }
            } catch (e) {
                console.log('Status poll error:', e);
            }
        }

        // ── Actions ──
        document.getElementById('btn-open-folder')?.addEventListener('click', () => invoke('open_sync_folder'));
        document.getElementById('btn-pause')?.addEventListener('click', async () => {
            const btn = document.getElementById('btn-pause');
            if (btn.textContent.includes('Pause')) {
                await invoke('pause_sync');
                btn.textContent = '▶ Resume syncing';
            } else {
                await invoke('resume_sync');
                btn.textContent = '⏸ Pause syncing';
            }
        });

        // Poll status every 5 seconds
        setInterval(pollStatus, 5000);
    </script>
</body>
</html>
